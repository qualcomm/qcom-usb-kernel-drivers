# DKMS configuration for Qualcomm USB kernel drivers
PACKAGE_NAME="qcom-usb-drivers"
PACKAGE_VERSION="1.0.6.1"

# Module 1: qtiDevInf (INF Parser)
BUILT_MODULE_NAME[0]="qtiDevInf"
BUILT_MODULE_LOCATION[0]="InfParser/"
DEST_MODULE_LOCATION[0]="/updates/dkms"

# Module 2: qcom_usb (USB diagnostic/QDSS driver)
BUILT_MODULE_NAME[1]="qcom_usb"
BUILT_MODULE_LOCATION[1]="qcom_usb/"
DEST_MODULE_LOCATION[1]="/updates/dkms"

# Module 3: qcom_usbnet (USB network driver)
BUILT_MODULE_NAME[2]="qcom_usbnet"
BUILT_MODULE_LOCATION[2]="qcom_usbnet/"
DEST_MODULE_LOCATION[2]="/updates/dkms"

# Module 4: qcom-serial (USB serial driver)
BUILT_MODULE_NAME[3]="qcom-serial"
BUILT_MODULE_LOCATION[3]="qcom_serial/"
DEST_MODULE_LOCATION[3]="/updates/dkms"

AUTOINSTALL="yes"
CLEAN="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build clean"
MAKE[0]="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build modules"