name: Build

on: [pull_request]

jobs:
  # ============================================================
  # Linux: build kernel modules
  # ============================================================
  build-linux:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install kernel headers and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            linux-headers-$(uname -r) \
            linux-modules-$(uname -r) \
            kmod

      - name: Locate dependency Module.symvers files
        run: |
          # usbnet and usbserial may be loadable modules OR built into the kernel.
          # Strategy (in priority order):
          #   1. Mine the kernel build-tree Module.symvers (covers both cases when present)
          #   2. Extract from .ko files (module case)
          #   3. Synthesize from /proc/kallsyms (built-in case — CRC placeholder 0x00000000)
          # The result is passed via KBUILD_EXTRA_SYMBOLS so modpost can resolve them.
          set -euo pipefail
          KREL=$(uname -r)
          SYMVERS_OUT=/tmp/deps.symvers
          mkdir -p /tmp
          > "$SYMVERS_OUT"   # start fresh

          # ── Step 1: mine the kernel build-tree Module.symvers ──────────────────
          SYS_SYMVERS=/lib/modules/$KREL/build/Module.symvers
          if [ -f "$SYS_SYMVERS" ]; then
            echo "Mining system Module.symvers for usbnet/usbserial symbols..."
            grep -P '\t(usbnet_|usb_serial_)' "$SYS_SYMVERS" >> "$SYMVERS_OUT" || true
          fi

          # ── Step 2: extract from .ko files (module case) ───────────────────────
          decompress_ko() {
            local src="$1"
            local base
            base=$(basename "$src")
            base=${base%.zst}; base=${base%.xz}
            local dst="/tmp/$base"
            case "$src" in
              *.zst) zstd -d --force -o "$dst" "$src" ;;
              *.xz)  xz -dk --stdout "$src" > "$dst" ;;
              *)     cp -f "$src" "$dst" ;;
            esac
            echo "$dst"
          }

          ko_to_symvers() {
            local ko="$1"
            local modname
            modname=$(basename "$ko" .ko)
            modprobe --dump-modversions "$ko" 2>/dev/null | \
              awk -v mod="$modname" '{printf "%s\t%s\t%s\tEXPORT_SYMBOL\n", $1, $2, mod}'
          }

          for MODNAME in usbnet usbserial; do
            KO_PATH=$(find /lib/modules/$KREL -name "${MODNAME}.ko*" 2>/dev/null | head -n1)
            if [ -n "$KO_PATH" ]; then
              echo "Found module: $KO_PATH"
              PLAIN_KO=$(decompress_ko "$KO_PATH")
              ko_to_symvers "$PLAIN_KO" >> "$SYMVERS_OUT"
            fi
          done

          # ── Step 3: synthesize from /proc/kallsyms (built-in fallback) ─────────
          # When usbnet/usbserial are compiled into the kernel there are no .ko files
          # and Module.symvers may not list them.  /proc/kallsyms always contains
          # every exported symbol.  modpost only needs the name to be present
          # (CRC checking is skipped when CONFIG_MODVERSIONS is off, common on CI
          # kernels); we use a placeholder CRC of 0x00000000.
          NEEDED_SYMS="usbnet_probe usbnet_disconnect usbnet_suspend usbnet_resume \
                       usbnet_start_xmit usbnet_change_mtu usbnet_skb_return \
                       usbnet_link_change usb_serial_generic_open usb_serial_suspend \
                       usb_serial_resume"

          if [ -r /proc/kallsyms ]; then
            for SYM in $NEEDED_SYMS; do
              # Skip if already present from steps 1/2
              if grep -qP "\t${SYM}\t" "$SYMVERS_OUT" 2>/dev/null; then
                continue
              fi
              # Check the symbol is actually exported by the running kernel
              if grep -qE " [TtRr] ${SYM}$" /proc/kallsyms 2>/dev/null; then
                echo "Synthesizing from kallsyms: $SYM"
                printf '0x00000000\t%s\tvmlinux\tEXPORT_SYMBOL\n' "$SYM" >> "$SYMVERS_OUT"
              fi
            done
          fi

          LINES=$(wc -l < "$SYMVERS_OUT")
          echo "--- $SYMVERS_OUT ($LINES entries) ---"
          cat "$SYMVERS_OUT" || true

          if [ "$LINES" -eq 0 ]; then
            echo "WARNING: No dependency symbols found; build may fail with undefined symbol errors."
          fi

          echo "EXTRA_SYMVERS=$SYMVERS_OUT" >> "$GITHUB_ENV"

      - name: Build kernel modules
        working-directory: src/linux
        run: |
          if [ -s "${EXTRA_SYMVERS:-}" ]; then
            make KBUILD_EXTRA_SYMBOLS="$EXTRA_SYMVERS"
          else
            make
          fi

      - name: Verify build outputs
        working-directory: src/linux
        run: |
          echo "=== Built kernel modules ==="
          find . -name "*.ko" | sort
          test -f InfParser/qtiDevInf.ko  || (echo "ERROR: qtiDevInf.ko not found"  && exit 1)
          test -f qcom_usb/qcom_usb.ko    || (echo "ERROR: qcom_usb.ko not found"    && exit 1)
          test -f qcom_usbnet/qcom_usbnet.ko || (echo "ERROR: qcom_usbnet.ko not found" && exit 1)

      - name: Upload Linux build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-kernel-modules-${{ matrix.os }}
          path: |
            src/linux/**/*.ko
          retention-days: 7

  # ============================================================
  # Linux: build .deb package (ubuntu-22.04 only)
  # ============================================================
  build-deb:
    runs-on: ubuntu-22.04
    needs: build-linux

    steps:
      - uses: actions/checkout@v4

      - name: Install dpkg tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg

      - name: Build .deb package
        working-directory: src/linux
        run: bash build-deb.sh

      - name: Verify .deb package
        working-directory: src/linux
        run: |
          DEB=$(find build -name "*.deb" | head -n 1)
          echo "Package: $DEB"
          test -n "$DEB" || (echo "ERROR: No .deb file produced" && exit 1)
          dpkg-deb -I "$DEB"
          dpkg-deb -c "$DEB"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb-package
          path: src/linux/build/*.deb
          retention-days: 7

  # ============================================================
  # Windows: build drivers (x86, x64, arm64)
  # ============================================================
  build-windows-drivers:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Install WDK
        shell: pwsh
        run: |
          $wdkUrl = "https://go.microsoft.com/fwlink/?linkid=2330411"
          $wdkInstaller = "$env:TEMP\wdksetup.exe"

          Write-Host "Downloading WDK via curl (follows redirects)..."
          & curl.exe -L --retry 3 --retry-delay 5 -o $wdkInstaller $wdkUrl
          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: curl download failed with exit code $LASTEXITCODE" -ForegroundColor Red
            exit $LASTEXITCODE
          }

          $fileSize = (Get-Item $wdkInstaller).Length
          Write-Host "Downloaded installer size: $fileSize bytes"
          if ($fileSize -lt 1MB) {
            Write-Host "ERROR: Downloaded file is too small ($fileSize bytes) -- likely corrupted or a redirect page." -ForegroundColor Red
            exit 1
          }

          Write-Host "Installing WDK silently..."
          $proc = Start-Process -FilePath $wdkInstaller `
                                -ArgumentList "/quiet /norestart" `
                                -PassThru -Wait
          if ($proc.ExitCode -ne 0) {
            Write-Host "ERROR: WDK installer exited with code $($proc.ExitCode)" -ForegroundColor Red
            exit $proc.ExitCode
          }
          Write-Host "WDK installation complete."

      - name: Build Windows drivers (x86, x64, arm64)
        shell: pwsh
        working-directory: build
        run: |
          powershell -ExecutionPolicy Bypass -File "build_drivers.ps1" -OutputTo "$env:GITHUB_WORKSPACE\build\target"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify driver build outputs
        shell: pwsh
        run: |
          $driversDir = "build\target\drivers"
          Write-Host "=== Driver build outputs ==="
          Get-ChildItem -Path $driversDir -Recurse -File | Select-Object FullName | Format-Table -AutoSize
          $sysFiles = Get-ChildItem -Path $driversDir -Recurse -Filter "*.sys"
          if ($sysFiles.Count -eq 0) {
            Write-Host "ERROR: No .sys files found in $driversDir" -ForegroundColor Red
            exit 1
          }
          Write-Host "Found $($sysFiles.Count) .sys file(s)." -ForegroundColor Green

      - name: Upload Windows driver artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-drivers
          path: build/target/drivers/
          retention-days: 7

  # ============================================================
  # Windows: build tools (x86, x64, arm64)
  # ============================================================
  build-windows-tools:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build Windows tools for all architectures
        shell: cmd
        working-directory: build
        run: |
          for %%A in (x86 x64 arm64) do (
            powershell -ExecutionPolicy Bypass -File "build_tools.ps1" -Platform %%A -OutputTo "%GITHUB_WORKSPACE%\build\target"
            if errorlevel 1 exit /b 1
          )

      - name: Verify tools build outputs
        shell: pwsh
        run: |
          $toolsDir = "build\target\tools"
          Write-Host "=== Tools build outputs ==="
          Get-ChildItem -Path $toolsDir -Recurse -File | Select-Object FullName | Format-Table -AutoSize
          $exeFiles = Get-ChildItem -Path $toolsDir -Recurse -Filter "*.exe"
          if ($exeFiles.Count -eq 0) {
            Write-Host "ERROR: No .exe files found in $toolsDir" -ForegroundColor Red
            exit 1
          }
          Write-Host "Found $($exeFiles.Count) .exe file(s)." -ForegroundColor Green

      - name: Upload Windows tools artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-tools
          path: build/target/tools/
          retention-days: 7

